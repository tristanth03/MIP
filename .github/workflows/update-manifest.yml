name: Update manifests

on:
  push:
    branches:
      - main
    paths:
      - "reports/**.html"
      - "data/**.md"

jobs:
  update-manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Rebuild manifests
        run: |
          python3 build_manifest.py
          python3 build_data_manifest.py

      - name: Copy manifests to docs for GitHub Pages
        run: |
          cp reports.json docs/reports.json
          cp data.json docs/data.json

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports.json data.json docs/reports.json docs/data.json
          git diff --cached --quiet || git commit -m "chore: auto-update manifests"
          git push
