<!DOCTYPE html>
<html lang="en" class="navy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIP — Market Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root.navy {
  --bg:#f2f4f6; --border:#D8E4EC;
  --text:#060F22; --sub:#3a5060; --acc:#0E6090; --silver:#A8B8C8;
  --code-bg:#0a0f1a; --code-border:#1e2d42;
  --tag-bg:rgba(14,96,144,0.1); --tag-border:#0E6090; --tag-color:#0E6090;
  --sidebar-bg:#eaecf0; --sidebar-border:#D8E4EC;
  --font-body:Georgia,serif; --hover-row:rgba(14,96,144,0.06); --divider:#c8d8e4;
}
:root.gunmetal {
  --bg:#030A14; --border:#708898;
  --text:#C0D0DC; --sub:#7090a8; --acc:#38B8E0; --silver:#506878;
  --code-bg:#040810; --code-border:#708898;
  --tag-bg:rgba(56,184,224,0.08); --tag-border:#38B8E0; --tag-color:#38B8E0;
  --sidebar-bg:#040d18; --sidebar-border:#1a2e3e;
  --font-body:Georgia,serif; --hover-row:rgba(56,184,224,0.05); --divider:#1a2e3e;
}

/* Logo theme visibility */
.navy .logo-dark   { display:none; }
.gunmetal .logo-light { display:none; }

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; overflow:hidden; }
body {
  background:var(--bg); color:var(--text);
  font-family:var(--font-body),'EB Garamond',Georgia,serif;
  line-height:1.78; -webkit-font-smoothing:antialiased;
  transition:background .25s, color .25s;
}

/* ── Shell ── */
.hub-shell { display:flex; height:100vh; }

/* ── Side panel ── */
.side-panel {
  width:340px; min-width:240px; max-width:520px; flex-shrink:0;
  background:var(--sidebar-bg); border-right:1px solid var(--sidebar-border);
  display:flex; flex-direction:column; height:100vh;
  transition:background .25s, border-color .25s;
  position:relative;
}

/* ── Header ── */
.side-header {
  padding:1.1rem 1.4rem .9rem;
  border-bottom:1px solid var(--divider);
  flex-shrink:0;
  display:flex; flex-direction:column; gap:.35rem;
}
.logo-wrap {
  display:flex; align-items:center; gap:.6rem;
  margin-bottom:.15rem;
}
.logo-wrap img {
  height:22px; width:auto; display:block;
}
.brand-label {
  font-family:'JetBrains Mono',monospace;
  font-size:0.59rem; letter-spacing:.18em; text-transform:uppercase;
  color:var(--acc); margin-bottom:.1rem;
}
.brand-title {
  font-size:1.44rem; font-weight:500; color:var(--text);
  font-family:var(--font-body); line-height:1.2;
}
.home-link {
  font-family:'JetBrains Mono',monospace; font-size:0.60rem;
  letter-spacing:.08em; color:var(--silver); text-decoration:none;
  margin-top:.2rem; display:inline-block;
  transition:color .15s;
}
.home-link:hover { color:var(--acc); }

/* ── Tab nav ── */
.tab-nav {
  display:flex; flex-shrink:0;
  padding:.6rem .9rem 0;
  gap:.25rem;
  border-bottom:1px solid var(--divider);
}
.tab-btn {
  padding:.3rem .9rem;
  font-family:'JetBrains Mono',monospace; font-size:0.70rem;
  letter-spacing:.1em; text-transform:uppercase;
  background:none; border:none; cursor:pointer;
  color:var(--silver); border-bottom:2px solid transparent;
  transition:color .15s, border-color .15s;
  margin-bottom:-1px; white-space:nowrap;
}
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--acc); border-bottom-color:var(--acc); }

/* ── Controls ── */
.controls {
  padding:.75rem 1.1rem;
  border-bottom:1px solid var(--divider);
  flex-shrink:0;
}
.search-box {
  width:100%; padding:.38rem .65rem;
  font-family:'JetBrains Mono',monospace; font-size:0.82rem;
  background:var(--bg); color:var(--text);
  border:1px solid var(--border); border-radius:4px;
  outline:none; transition:border-color .15s;
}
.search-box:focus { border-color:var(--acc); }
.search-box::placeholder { color:var(--silver); }
.filter-row {
  display:flex; align-items:center; gap:.4rem;
  margin-top:.45rem; flex-wrap:wrap;
}
.filter-select {
  font-family:'JetBrains Mono',monospace; font-size:0.68rem;
  background:var(--tag-bg); color:var(--tag-color);
  border:1px solid var(--tag-border); border-radius:3px;
  padding:2px 6px; cursor:pointer; outline:none;
  transition:background .12s; max-width:110px;
}
.filter-select:hover { background:var(--hover-row); }
.sort-btn {
  font-family:'JetBrains Mono',monospace; font-size:0.68rem;
  background:var(--tag-bg); color:var(--tag-color);
  border:1px solid var(--tag-border); border-radius:3px;
  padding:2px 8px; cursor:pointer; outline:none;
  transition:background .12s;
}
.sort-btn:hover { background:var(--hover-row); }
.sort-btn.asc { background:var(--acc); color:#fff; border-color:var(--acc); }
.recent-btn {
  font-family:'JetBrains Mono',monospace; font-size:0.68rem;
  background:var(--tag-bg); color:var(--tag-color);
  border:1px solid var(--tag-border); border-radius:3px;
  padding:2px 8px; cursor:pointer; outline:none;
  transition:background .12s;
}
.recent-btn:hover { background:var(--hover-row); }
.recent-btn.active { background:var(--acc); color:#fff; border-color:var(--acc); }
.result-count {
  font-family:'JetBrains Mono',monospace; font-size:0.62rem;
  color:var(--silver); margin-left:auto;
}

/* ── Lists ── */
.report-list, .data-list {
  flex:1; overflow-y:auto; padding:.4rem 0;
}
.data-list { display:none; }

.report-item, .data-item {
  padding:.5rem 1.4rem;
  border-left:2px solid transparent;
  cursor:pointer;
  transition:background .12s, border-color .12s;
}
.report-item:hover, .data-item:hover { background:var(--hover-row); }
.report-item.active, .data-item.active {
  border-left-color:var(--acc);
  background:var(--tag-bg);
}
.item-title {
  font-family:'JetBrains Mono',monospace; font-size:0.80rem;
  color:var(--text); line-height:1.4; display:block;
}
.item-meta {
  font-family:'JetBrains Mono',monospace; font-size:0.62rem;
  color:var(--silver); margin-top:.12rem;
  display:flex; gap:.7rem; align-items:center; flex-wrap:wrap;
}
.item-meta .cat { color:var(--acc); }
.item-tag {
  font-family:'JetBrains Mono',monospace; font-size:0.58rem;
  background:var(--tag-bg); color:var(--tag-color);
  border:1px solid var(--tag-border); border-radius:2px;
  padding:0 4px;
}

/* ── Report category groups ── */
.report-group { margin-bottom:.1rem; }
.report-group-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:.38rem 1.4rem .38rem 1.1rem;
  cursor:pointer; user-select:none;
  border-left:2px solid transparent;
  transition:background .12s;
}
.report-group-hdr:hover { background:var(--hover-row); }
.report-group-hdr .grp-name {
  font-family:'JetBrains Mono',monospace; font-size:0.66rem;
  letter-spacing:.12em; text-transform:uppercase; color:var(--silver);
}
.report-group-hdr .grp-right {
  display:flex; align-items:center; gap:.5rem;
}
.report-group-hdr .grp-count {
  font-family:'JetBrains Mono',monospace; font-size:0.58rem;
  color:var(--acc); background:var(--tag-bg);
  border:1px solid var(--tag-border); border-radius:9px;
  padding:0 5px;
}
.report-group-hdr .grp-arrow {
  font-size:0.66rem; color:var(--silver);
  transition:transform .15s; display:inline-block;
}
.report-group.collapsed .grp-arrow { transform:rotate(-90deg); }
.report-group.collapsed .report-group-body { display:none; }
.report-group-body .report-item { padding-left:1.8rem; }

/* ── Data groups ── */
.data-group { margin-bottom:.1rem; }
.data-group-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:.38rem 1.4rem .38rem 1.1rem;
  cursor:pointer; user-select:none;
  border-left:2px solid transparent;
  transition:background .12s;
}
.data-group-hdr:hover { background:var(--hover-row); }
.data-group-hdr .grp-name {
  font-family:'JetBrains Mono',monospace; font-size:0.66rem;
  letter-spacing:.12em; text-transform:uppercase; color:var(--silver);
}
.data-group-hdr .grp-right {
  display:flex; align-items:center; gap:.5rem;
}
.data-group-hdr .grp-count {
  font-family:'JetBrains Mono',monospace; font-size:0.58rem;
  color:var(--acc); background:var(--tag-bg);
  border:1px solid var(--tag-border); border-radius:9px;
  padding:0 5px;
}
.data-group-hdr .grp-arrow {
  font-size:0.66rem; color:var(--silver);
  transition:transform .15s; display:inline-block;
}
.data-group.collapsed .grp-arrow { transform:rotate(-90deg); }
.data-group.collapsed .data-group-body { display:none; }
.data-group-body .data-item { padding-left:1.8rem; }

.data-sector-hdr {
  padding:.25rem 1.8rem .15rem;
  font-family:'JetBrains Mono',monospace; font-size:0.59rem;
  letter-spacing:.13em; text-transform:uppercase;
  color:var(--acc); opacity:.7;
}

/* ── Footer ── */
.side-footer {
  flex-shrink:0; padding:.65rem 1.4rem;
  border-top:1px solid var(--divider);
  display:flex; align-items:center;
}
.tswrap {
  display:flex; align-items:center; gap:.5rem;
  font-family:'JetBrains Mono',monospace;
  font-size:0.62rem; letter-spacing:.07em; text-transform:uppercase;
  color:var(--silver);
}
.tsw {
  position:relative; width:30px; height:16px;
  background:var(--border); border-radius:8px;
  cursor:pointer; border:1px solid var(--acc); flex-shrink:0;
  transition:background .2s;
}
.tsw::after {
  content:''; position:absolute; top:2px; left:2px;
  width:10px; height:10px; background:var(--acc);
  border-radius:50%; transition:transform .2s;
}
.tsw.on::after { transform:translateX(14px); }

/* ── Resize handle ── */
.resize-handle {
  position:absolute; right:-3px; top:0; bottom:0; width:6px;
  cursor:col-resize; z-index:10;
}
.resize-handle:hover::after, .resize-handle.dragging::after {
  content:''; position:absolute;
  left:2px; top:0; bottom:0; width:2px;
  background:var(--acc); opacity:.5;
}

/* ── Viewer ── */
.viewer {
  flex:1; display:flex; flex-direction:column;
  min-width:0; background:var(--bg);
}
.viewer-toolbar {
  display:flex; align-items:center; gap:.5rem;
  padding:.4rem 1rem; border-bottom:1px solid var(--border);
  background:var(--sidebar-bg); flex-shrink:0;
  transition:background .25s;
}
.viewer-title {
  flex:1; font-family:'JetBrains Mono',monospace;
  font-size:0.72rem; color:var(--sub);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.viewer-toolbar .btn {
  font-family:'JetBrains Mono',monospace; font-size:0.66rem;
  letter-spacing:.07em; text-transform:uppercase;
  color:var(--acc); background:none; border:1px solid var(--acc);
  border-radius:3px; padding:2px 9px; cursor:pointer;
  text-decoration:none; transition:background .12s, color .12s;
  white-space:nowrap;
}
.viewer-toolbar .btn:hover { background:var(--acc); color:#fff; }

.viewer-frame { flex:1; border:none; width:100%; }
.viewer-placeholder {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:.6rem;
  font-family:'JetBrains Mono',monospace;
  color:var(--silver); text-align:center; padding:2rem;
}
.viewer-placeholder .ph-label { font-size:0.78rem; }
.viewer-placeholder .ph-hint  { font-size:0.62rem; opacity:.6; }

/* ── Markdown viewer ── */
.md-viewer {
  flex:1; overflow-y:auto;
  padding:2.5rem min(4rem, 6vw);
  display:none;
  font-family:var(--font-body),'EB Garamond',Georgia,serif;
  font-size:1.20rem; line-height:1.82; color:var(--text);
  max-width:860px; margin:0 auto; width:100%;
}
.md-viewer h1, .md-viewer h2, .md-viewer h3, .md-viewer h4 {
  font-family:var(--font-body); font-weight:500;
  color:var(--text); margin:2rem 0 .5rem; line-height:1.3;
}
.md-viewer h1 { font-size:2.04rem; margin-top:0; }
.md-viewer h2 { font-size:1.50rem; border-bottom:1px solid var(--border); padding-bottom:.3rem; }
.md-viewer h3 { font-size:1.26rem; }
.md-viewer p  { margin:.65rem 0; }
.md-viewer a  { color:var(--acc); }
.md-viewer code {
  font-family:'JetBrains Mono',monospace; font-size:0.90em;
  background:var(--tag-bg); padding:1px 5px; border-radius:3px;
}
.md-viewer pre {
  background:var(--code-bg); border:1px solid var(--code-border);
  border-radius:5px; padding:1.1rem 1.3rem; overflow-x:auto; margin:1.2rem 0;
}
.md-viewer pre code { background:none; padding:0; color:#9eb8cc; font-size:0.96rem; }
.md-viewer ul, .md-viewer ol { padding-left:1.6rem; margin:.6rem 0; }
.md-viewer li  { margin:.2rem 0; }
.md-viewer blockquote {
  border-left:3px solid var(--acc); margin:.9rem 0;
  padding:.4rem 1.1rem; color:var(--sub); font-style:italic;
}
.md-viewer table { border-collapse:collapse; width:100%; margin:1.1rem 0; }
.md-viewer th, .md-viewer td {
  border:1px solid var(--border); padding:.4rem .9rem;
  font-family:'JetBrains Mono',monospace; font-size:0.84rem;
}
.md-viewer th { background:var(--tag-bg); color:var(--acc); font-weight:500; }
.md-viewer tr:nth-child(even) td { background:var(--hover-row); }
.md-viewer hr { border:none; border-top:1px solid var(--border); margin:1.5rem 0; }

/* ── Scrollbars ── */
.report-list::-webkit-scrollbar,
.data-list::-webkit-scrollbar,
.md-viewer::-webkit-scrollbar { width:3px; }
.report-list::-webkit-scrollbar-thumb,
.data-list::-webkit-scrollbar-thumb,
.md-viewer::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.empty-state {
  padding:2.5rem 1.4rem; text-align:center;
  font-family:'JetBrains Mono',monospace; font-size:0.74rem;
  color:var(--silver); line-height:1.8;
}
</style>
</head>
<body>
<div class="hub-shell">

  <!-- ── Side panel ── -->
  <div class="side-panel" id="sidePanel">

    <div class="side-header">
      <div class="logo-wrap">
        <img class="logo-light" src="logo-light.png" alt="MIP" onerror="this.style.display='none'">
        <img class="logo-dark"  src="logo-dark.png"  alt="MIP" onerror="this.style.display='none'">
      </div>
      <div class="brand-label">Market Intelligence Platform</div>
      <div class="brand-title">MIP</div>
      <a class="home-link" href="index.html">← Home</a>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" id="tabReports" onclick="switchTab('reports')">Reports</button>
      <button class="tab-btn"        id="tabData"    onclick="switchTab('data')">Data</button>
    </div>

    <!-- Reports controls -->
    <div class="controls" id="reportControls">
      <input type="text" class="search-box" id="searchBox" placeholder="Search reports…" autocomplete="off">
      <div class="filter-row">
        <select class="filter-select" id="catSelect">
          <option value="">All categories</option>
        </select>
        <button class="sort-btn"   id="sortBtn">Date ↓</button>
        <button class="recent-btn" id="recentBtn">Recent</button>
        <span class="result-count" id="resultCount"></span>
      </div>
    </div>

    <!-- Data controls -->
    <div class="controls" id="dataControls" style="display:none;">
      <input type="text" class="search-box" id="dataSearch" placeholder="Search data…" autocomplete="off">
      <div class="filter-row">
        <select class="filter-select" id="countrySelect">
          <option value="">All countries</option>
        </select>
        <select class="filter-select" id="sectorSelect">
          <option value="">All sectors</option>
        </select>
        <span class="result-count" id="dataResultCount"></span>
      </div>
    </div>

    <div class="report-list" id="reportList"></div>
    <div class="data-list"   id="dataList"></div>

    <div class="side-footer">
      <div class="tswrap">
        <span>Navy</span>
        <div class="tsw" id="tsw" onclick="toggleTheme()"></div>
        <span>Gunmetal</span>
      </div>
    </div>

    <div class="resize-handle" id="resizeHandle"></div>
  </div>

  <!-- ── Viewer ── -->
  <div class="viewer" id="viewer">
    <div class="viewer-toolbar" id="viewerToolbar" style="display:none;">
      <span class="viewer-title" id="viewerTitle"></span>
      <a class="btn" id="btnNewTab" href="#" target="_blank">Open ↗</a>
      <a class="btn" id="btnDownload" href="#" download>Download ↓</a>
      <button class="btn" onclick="closeViewer()">Close ✕</button>
    </div>
    <div class="viewer-placeholder" id="viewerPlaceholder">
      <span class="ph-label">Nothing selected</span>
      <span class="ph-hint">Choose a report or data file from the left panel</span>
    </div>
    <iframe class="viewer-frame" id="viewerFrame" style="display:none;"></iframe>
    <div class="md-viewer" id="mdViewer"></div>
  </div>

</div>
<script>
(function(){
  let reports   = [];
  let dataFiles = [];
  let sortDesc  = true;
  let recentMode = false;
  let activeFile = null;
  let collapsedGroups     = new Set();
  let collapsedDataGroups = new Set();

  const searchBox       = document.getElementById('searchBox');
  const dataSearch      = document.getElementById('dataSearch');
  const sortBtn         = document.getElementById('sortBtn');
  const recentBtn       = document.getElementById('recentBtn');
  const catSelect       = document.getElementById('catSelect');
  const countrySelect   = document.getElementById('countrySelect');
  const sectorSelect    = document.getElementById('sectorSelect');
  const reportList      = document.getElementById('reportList');
  const dataList        = document.getElementById('dataList');
  const reportControls  = document.getElementById('reportControls');
  const dataControls    = document.getElementById('dataControls');
  const resultCount     = document.getElementById('resultCount');
  const dataResultCount = document.getElementById('dataResultCount');
  const viewerToolbar   = document.getElementById('viewerToolbar');
  const viewerTitle     = document.getElementById('viewerTitle');
  const viewerFrame     = document.getElementById('viewerFrame');
  const viewerPlaceholder = document.getElementById('viewerPlaceholder');
  const mdViewer        = document.getElementById('mdViewer');
  const btnNewTab       = document.getElementById('btnNewTab');
  const btnDownload     = document.getElementById('btnDownload');

  /* ── Theme ── */
  window.toggleTheme = function(){
    const dark = document.documentElement.classList.toggle('gunmetal');
    document.documentElement.classList.toggle('navy', !dark);
    document.getElementById('tsw').classList.toggle('on', dark);
    localStorage.setItem('hub-theme', dark ? 'gunmetal' : 'navy');
  };
  (function(){
    if (localStorage.getItem('hub-theme') === 'gunmetal') {
      document.documentElement.classList.replace('navy','gunmetal');
      document.getElementById('tsw').classList.add('on');
    }
  })();

  /* ── URL param: ?tab=data ── */
  (function(){
    const params = new URLSearchParams(window.location.search);
    if (params.get('tab') === 'data') {
      setTimeout(function(){ switchTab('data'); }, 0);
    }
  })();

  /* ── Tabs ── */
  window.switchTab = function(tab){
    document.getElementById('tabReports').classList.toggle('active', tab === 'reports');
    document.getElementById('tabData').classList.toggle('active', tab === 'data');
    reportControls.style.display = tab === 'reports' ? 'block' : 'none';
    dataControls.style.display   = tab === 'data'    ? 'block' : 'none';
    reportList.style.display     = tab === 'reports' ? 'block' : 'none';
    dataList.style.display       = tab === 'data'    ? 'block' : 'none';
    closeViewer();
  };

  /* ── Load reports ── */
  fetch('reports.json')
    .then(r => { if (!r.ok) throw r; return r.json(); })
    .then(data => {
      reports = data;
      buildCatFilter();
      renderReports();
    })
    .catch(e => {
      console.error('Failed to load reports.json:', e);
      reportList.innerHTML = '<div class="empty-state">Could not load reports.json</div>';
    });

  /* ── Load data ── */
  fetch('data.json')
    .then(r => { if (!r.ok) throw r; return r.json(); })
    .then(files => {
      dataFiles = files;
      buildDataFilters();
      renderDataList();
    })
    .catch(e => {
      console.error('Failed to load data.json:', e);
      dataList.innerHTML = '<div class="empty-state">No data files found.<br>Commit .md files to data/</div>';
    });

  /* ── Category filter ── */
  function buildCatFilter(){
    const cats = [...new Set(
      reports
        .filter(r => r.category && r.category !== 'Category missing Report')
        .map(r => r.category)
    )].sort();
    catSelect.innerHTML = '<option value="">All categories</option>';
    cats.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      catSelect.appendChild(o);
    });
  }

  /* ── Data filters ── */
  function buildDataFilters(){
    const countries = [...new Set(dataFiles.map(f => f.country).filter(Boolean))].sort();
    const sectors   = [...new Set(dataFiles.map(f => f.sector).filter(Boolean))].sort();
    countrySelect.innerHTML = '<option value="">All countries</option>';
    countries.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      countrySelect.appendChild(o);
    });
    sectorSelect.innerHTML = '<option value="">All sectors</option>';
    sectors.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      sectorSelect.appendChild(o);
    });
  }

  /* ── Sort helper ── */
  function sortedReports(list){
    return list.slice().sort((a, b) => {
      const da = a.date || '', db = b.date || '';
      if (da < db) return sortDesc ?  1 : -1;
      if (da > db) return sortDesc ? -1 :  1;
      return (a.title || '').localeCompare(b.title || '');
    });
  }

  /* ── Render reports ── */
  function renderReports(){
    const q   = searchBox.value.trim().toLowerCase();
    const cat = catSelect.value;
    reportList.innerHTML = '';

    let pool = reports.filter(r => r.title && r.title !== 'Title missing');

    if (cat) pool = pool.filter(r => r.category === cat);

    // Recent mode: flat list of 20 newest
    if (recentMode) {
      const list = sortedReports(pool).slice(0, 20);
      resultCount.textContent = 'Recent ' + list.length;
      if (!list.length) { reportList.innerHTML = '<div class="empty-state">No reports.</div>'; return; }
      list.forEach(r => reportList.appendChild(makeReportItem(r, true)));
      return;
    }

    // Search mode: flat filtered
    if (q) {
      const list = sortedReports(pool.filter(r =>
        (r.title || '').toLowerCase().includes(q) ||
        (r.category || '').toLowerCase().includes(q)
      ));
      resultCount.textContent = list.length + (list.length === 1 ? ' result' : ' results');
      if (!list.length) { reportList.innerHTML = '<div class="empty-state">No matches.</div>'; return; }
      list.forEach(r => reportList.appendChild(makeReportItem(r, true)));
      return;
    }

    // Default: grouped by category
    const grouped = {};
    sortedReports(pool).forEach(r => {
      const c = (r.category && r.category !== 'Category missing Report') ? r.category : 'Uncategorised';
      (grouped[c] = grouped[c] || []).push(r);
    });
    const cats = Object.keys(grouped).sort();
    resultCount.textContent = pool.length + ' report' + (pool.length !== 1 ? 's' : '');
    cats.forEach(c => {
      const items = grouped[c];
      const grp = document.createElement('div');
      grp.className = 'report-group' + (collapsedGroups.has(c) ? ' collapsed' : '');
      const hdr = document.createElement('div');
      hdr.className = 'report-group-hdr';
      hdr.innerHTML =
        '<span class="grp-name">' + esc(c) + '</span>' +
        '<span class="grp-right">' +
          '<span class="grp-count">' + items.length + '</span>' +
          '<span class="grp-arrow">▾</span>' +
        '</span>';
      hdr.addEventListener('click', () => {
        grp.classList.toggle('collapsed');
        if (grp.classList.contains('collapsed')) collapsedGroups.add(c);
        else collapsedGroups.delete(c);
      });
      const body = document.createElement('div');
      body.className = 'report-group-body';
      items.forEach(r => body.appendChild(makeReportItem(r, false)));
      grp.appendChild(hdr);
      grp.appendChild(body);
      reportList.appendChild(grp);
    });
  }

  function makeReportItem(r, showCat){
    const el = document.createElement('div');
    el.className = 'report-item' + (r.file === activeFile ? ' active' : '');
    el.innerHTML =
      '<span class="item-title">' + esc(r.title) + '</span>' +
      '<div class="item-meta">' +
        (showCat && r.category ? '<span class="cat">' + esc(r.category) + '</span>' : '') +
        (r.date ? '<span>' + fmtDate(r.date) + '</span>' : '') +
      '</div>';
    el.addEventListener('click', () => openReport(r));
    return el;
  }

  /* ── Render data list (grouped by country then sector) ── */
  function renderDataList(){
    const q       = dataSearch.value.trim().toLowerCase();
    const country = countrySelect.value;
    const sector  = sectorSelect.value;

    let pool = dataFiles;
    if (q)       pool = pool.filter(f =>
      (f.title   || '').toLowerCase().includes(q) ||
      (f.country || '').toLowerCase().includes(q) ||
      (f.sector  || '').toLowerCase().includes(q) ||
      (f.source  || '').toLowerCase().includes(q) ||
      (f.type    || '').toLowerCase().includes(q)
    );
    if (country) pool = pool.filter(f => f.country === country);
    if (sector)  pool = pool.filter(f => f.sector  === sector);

    dataResultCount.textContent = pool.length + ' endpoint' + (pool.length !== 1 ? 's' : '');

    if (!pool.length) {
      dataList.innerHTML = '<div class="empty-state">No data files found.</div>';
      return;
    }

    // Group by country then sector
    const byCountry = {};
    pool.forEach(f => {
      const c = f.country || 'Other';
      const s = f.sector  || 'General';
      if (!byCountry[c]) byCountry[c] = {};
      (byCountry[c][s] = byCountry[c][s] || []).push(f);
    });

    dataList.innerHTML = '';
    const countries = Object.keys(byCountry).sort();
    countries.forEach(c => {
      const countryItems = Object.values(byCountry[c]).flat();
      const grp = document.createElement('div');
      grp.className = 'data-group' + (collapsedDataGroups.has(c) ? ' collapsed' : '');

      const hdr = document.createElement('div');
      hdr.className = 'data-group-hdr';
      hdr.innerHTML =
        '<span class="grp-name">' + esc(c) + '</span>' +
        '<span class="grp-right">' +
          '<span class="grp-count">' + countryItems.length + '</span>' +
          '<span class="grp-arrow">▾</span>' +
        '</span>';
      hdr.addEventListener('click', () => {
        grp.classList.toggle('collapsed');
        if (grp.classList.contains('collapsed')) collapsedDataGroups.add(c);
        else collapsedDataGroups.delete(c);
      });

      const body = document.createElement('div');
      body.className = 'data-group-body';

      const sectors = Object.keys(byCountry[c]).sort();
      sectors.forEach(s => {
        if (sectors.length > 1) {
          const sh = document.createElement('div');
          sh.className = 'data-sector-hdr';
          sh.textContent = s;
          body.appendChild(sh);
        }
        byCountry[c][s].forEach(f => {
          const el = document.createElement('div');
          el.className = 'data-item';
          const tags = [];
          if (f.type)   tags.push('<span class="item-tag">' + esc(f.type) + '</span>');
          if (f.source) tags.push('<span class="item-tag">' + esc(f.source) + '</span>');
          el.innerHTML =
            '<span class="item-title">' + esc(f.title || f.file) + '</span>' +
            (tags.length ? '<div class="item-meta">' + tags.join('') + '</div>' : '');
          el.addEventListener('click', () => openMarkdown(f, el));
          body.appendChild(el);
        });
      });

      grp.appendChild(hdr);
      grp.appendChild(body);
      dataList.appendChild(grp);
    });
  }

  /* ── Open report ── */
  function openReport(r){
    activeFile = r.file;
    const url = '../reports/' + r.file;
    mdViewer.style.display = 'none';
    viewerFrame.src = url;
    viewerFrame.style.display = 'block';
    viewerPlaceholder.style.display = 'none';
    viewerToolbar.style.display = 'flex';
    viewerTitle.textContent = r.title;
    btnNewTab.href = url;
    btnDownload.href = url; btnDownload.download = r.file;
    document.querySelectorAll('.report-item').forEach(e => e.classList.remove('active'));
    document.querySelectorAll('.report-item').forEach(e => {
      if (e.querySelector('.item-title') && e.querySelector('.item-title').textContent === r.title)
        e.classList.add('active');
    });
  }

  /* ── Open markdown ── */
  function openMarkdown(f, itemEl){
    document.querySelectorAll('.data-item').forEach(e => e.classList.remove('active'));
    itemEl.classList.add('active');
    activeFile = f.file;
    viewerFrame.style.display = 'none'; viewerFrame.src = 'about:blank';
    viewerPlaceholder.style.display = 'none';
    viewerToolbar.style.display = 'flex';
    viewerTitle.textContent = f.title || f.file;
    btnNewTab.href = '../data/' + f.file;
    btnDownload.href = '../data/' + f.file; btnDownload.download = f.file.split('/').pop();
    mdViewer.style.display = 'block';
    mdViewer.innerHTML = '<div class="empty-state">Loading…</div>';
    fetch('../data/' + f.file)
      .then(r => { if (!r.ok) throw r; return r.text(); })
      .then(md => { mdViewer.innerHTML = marked.parse(md); mdViewer.scrollTop = 0; })
      .catch(() => { mdViewer.innerHTML = '<div class="empty-state">Failed to load file.</div>'; });
  }

  /* ── Close viewer ── */
  window.closeViewer = function(){
    activeFile = null;
    viewerFrame.src = 'about:blank'; viewerFrame.style.display = 'none';
    mdViewer.style.display = 'none'; mdViewer.innerHTML = '';
    viewerPlaceholder.style.display = 'flex';
    viewerToolbar.style.display = 'none';
    document.querySelectorAll('.report-item,.data-item').forEach(e => e.classList.remove('active'));
  };

  /* ── Report controls events ── */
  sortBtn.addEventListener('click', () => {
    sortDesc = !sortDesc;
    sortBtn.textContent = sortDesc ? 'Date ↓' : 'Date ↑';
    sortBtn.classList.toggle('asc', !sortDesc);
    renderReports();
  });
  recentBtn.addEventListener('click', () => {
    recentMode = !recentMode;
    recentBtn.classList.toggle('active', recentMode);
    searchBox.value = '';
    renderReports();
  });
  searchBox.addEventListener('input', () => {
    if (recentMode) { recentMode = false; recentBtn.classList.remove('active'); }
    renderReports();
  });
  catSelect.addEventListener('change', renderReports);

  /* ── Data controls events ── */
  dataSearch.addEventListener('input', renderDataList);
  countrySelect.addEventListener('change', renderDataList);
  sectorSelect.addEventListener('change', renderDataList);

  /* ── Resizable panel ── */
  const panel  = document.getElementById('sidePanel');
  const handle = document.getElementById('resizeHandle');
  let dragging = false, startX = 0, startW = 0;
  handle.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; startW = panel.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.min(520, Math.max(240, startW + (e.clientX - startX)));
    panel.style.width = w + 'px';
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.userSelect = '';
  });

  /* ── Helpers ── */
  function esc(s){
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
  }
  function fmtDate(d){
    if (!d) return '';
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const [dt, tm] = d.split('T');
    const [y, m, day] = dt.split('-');
    return day + ' ' + (mo[+m - 1] || m) + ' ' + y + (tm ? ', ' + tm : '');
  }
})();
</script>
</body>
</html>
