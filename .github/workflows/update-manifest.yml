name: Update manifests

on:
  push:
    paths:
      - "reports/**.html"
      - "data/**.md"

jobs:
  update-manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Rebuild reports.json
        if: contains(toJson(github.event.commits.*.added + github.event.commits.*.modified), 'reports/')
        run: python3 build_manifest.py

      - name: Rebuild data.json
        if: contains(toJson(github.event.commits.*.added + github.event.commits.*.modified), 'data/')
        run: python3 build_data_manifest.py

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports.json data.json
          git diff --cached --quiet || git commit -m "chore: auto-update manifests"
          git push
