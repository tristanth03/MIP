name: Update reports.json

on:
  push:
    paths:
      - "reports/**.html"

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Rebuild reports.json
        run: python3 build_manifest.py

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports.json
          git diff --cached --quiet || git commit -m "chore: auto-update reports.json"
          git push
