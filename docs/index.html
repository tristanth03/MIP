<!DOCTYPE html>
<html lang="en" class="navy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIP — Market Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root.navy{--bg:#f2f4f6;--text:#060F22;--sub:#3a5060;--acc:#0E6090;--silver:#A8B8C8;--border:#D8E4EC;}
:root.gunmetal{--bg:#030A14;--text:#C0D0DC;--sub:#7090a8;--acc:#38B8E0;--silver:#506878;--border:#708898;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'EB Garamond',Georgia,serif;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s;}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.landing{display:flex;flex-direction:column;align-items:center;gap:2.8rem;padding:2rem;}
.logo-wrap{width:280px;max-width:80vw;}
.logo-wrap svg{width:100%;height:auto;display:block;}
.navy .logo-dark{display:none;}
.gunmetal .logo-light{display:none;}
.btn-row{display:flex;gap:1.2rem;flex-wrap:wrap;justify-content:center;}
.btn-big{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);background:none;border:1px solid var(--acc);border-radius:4px;padding:10px 36px;cursor:pointer;text-decoration:none;transition:background .15s,color .15s;white-space:nowrap;}
.btn-big:hover{background:var(--acc);color:#fff;}
.theme-wrap{position:fixed;bottom:1.8rem;right:2rem;display:flex;align-items:center;gap:.45rem;font-family:'JetBrains Mono',monospace;font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;color:var(--silver);}
.tsw{position:relative;width:28px;height:15px;background:var(--border);border-radius:8px;cursor:pointer;border:1px solid var(--acc);flex-shrink:0;transition:background .2s;}
.tsw::after{content:'';position:absolute;top:2px;left:2px;width:9px;height:9px;background:var(--acc);border-radius:50%;transition:transform .2s;}
.tsw.on::after{transform:translateX(13px);}
</style>
</head>
<body>
<main class="landing">
  <div class="logo-wrap logo-light">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 265" fill="none">
      <path d="M 72 24 L 196 18" stroke="#0E6090" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M 196 18 Q 318 12 322 95 Q 325 162 268 176" stroke="#0E6090" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="72" cy="24" r="6.5" fill="#0E6090"/>
      <circle cx="196" cy="18" r="6.5" fill="#0E6090"/>
      <circle cx="268" cy="176" r="6.5" fill="#0E6090"/>
      <text x="14" y="172" font-family="Georgia,'Times New Roman',serif" font-size="152" fill="#060F22">M</text>
      <text x="172" y="172" font-family="Georgia,'Times New Roman',serif" font-size="152" fill="#0E6090">I</text>
      <text x="204" y="172" font-family="Georgia,'Times New Roman',serif" font-size="152" fill="#060F22">P</text>
      <text x="190" y="212" font-family="Georgia,'Times New Roman',serif" font-size="13.5" text-anchor="middle" letter-spacing="3" fill="#3a5060">MARKET INTELLIGENCE</text>
      <text x="190" y="233" font-family="Georgia,'Times New Roman',serif" font-size="13.5" text-anchor="middle" letter-spacing="3" fill="#A8B8C8">PLATFORM</text>
    </svg>
  </div>
  <div class="logo-wrap logo-dark">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 265" fill="none">
      <path d="M 72 24 L 196 18" stroke="#38B8E0" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M 196 18 Q 318 12 322 95 Q 325 162 268 176" stroke="#38B8E0" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="72" cy="24" r="6.5" fill="#38B8E0"/>
      <circle cx="196" cy="18" r="6.5" fill="#38B8E0"/>
      <circle cx="268" cy="176" r="6.5" fill="#38B8E0"/>
      <text x="14" y="172" font-family="Georgia,'Times New Roman',serif" font-size="152" fill="#C0D0DC">M</text>
      <text x="172" y="172" font-family="Georgia,'Times New Roman',serif" font-size="152" fill="#38B8E0">I</text>
      <text x="204" y="172" font-family="Georgia,'Times New Roman',serif" font-size="152" fill="#C0D0DC">P</text>
      <text x="190" y="212" font-family="Georgia,'Times New Roman',serif" font-size="13.5" text-anchor="middle" letter-spacing="3" fill="#7090a8">MARKET INTELLIGENCE</text>
      <text x="190" y="233" font-family="Georgia,'Times New Roman',serif" font-size="13.5" text-anchor="middle" letter-spacing="3" fill="#506878">PLATFORM</text>
    </svg>
  </div>
  <div class="btn-row">
    <a class="btn-big" href="hub.html">Reports</a>
    <a class="btn-big" href="hub.html?tab=data">Data</a>
  </div>
</main>
<div class="theme-wrap">
  <span>Navy</span>
  <div class="tsw" id="tsw" onclick="toggleTheme()"></div>
  <span>Gunmetal</span>
</div>
<script>
(function(){
  window.toggleTheme=function(){
    const dark=document.documentElement.classList.toggle('gunmetal');
    document.documentElement.classList.toggle('navy',!dark);
    document.getElementById('tsw').classList.toggle('on',dark);
    localStorage.setItem('hub-theme',dark?'gunmetal':'navy');
  };
  if(localStorage.getItem('hub-theme')==='gunmetal'){
    document.documentElement.classList.replace('navy','gunmetal');
    document.getElementById('tsw').classList.add('on');
  }
})();
</script>
</body>
</html>
